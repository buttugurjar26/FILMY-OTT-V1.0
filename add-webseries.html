<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FILMY OTT | Add Web Series</title>

<link rel="stylesheet" href="add-movie.css">

</head>


<body>


<div class="movie-box">

<h1>Add New Web Series</h1>

<p class="subtitle">
Upload your latest web series to FILMY OTT
</p>


<input type="text" id="seriesName" placeholder="📺 Web Series Name">


<input type="text" id="seriesPoster" placeholder="🖼 Poster Image URL">


<input type="text" id="seriesCategory" placeholder="🎭 Category (Action, Drama...)">


<input type="text" id="seriesYear" placeholder="📅 Release Year">


<textarea id="seriesDesc" placeholder="📝 Web Series Description"></textarea>



<button onclick="saveSeries()">

📺 Save Web Series

</button>


<p id="message"></p>


</div>



<script type="module" src="add-webseries.js"></script>


</body>

</html>
