<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FILMY OTT | Add Movie</title>

<link rel="stylesheet" href="add-movie.css">

</head>


<body>


<div class="movie-box">


<h1>
Add New Movie
</h1>


<p class="subtitle">
Upload your latest movie to FILMY OTT
</p>




<input 
type="text"
id="movieName"
placeholder="🎬 Movie Name">



<input 
type="text"
id="moviePoster"
placeholder="🖼 Poster Image URL">



<input 
type="text"
id="movieCategory"
placeholder="🎭 Category (Action, Drama...)">



<input 
type="text"
id="movieYear"
placeholder="📅 Release Year">



<textarea
id="movieDesc"
placeholder="📝 Movie Description">
</textarea>




<input 
type="text"
id="movieVideo"
placeholder="🎥 Video URL">





<button onclick="saveMovie()">

🎬 Save Movie

</button>




<p id="message"></p>



</div>




<script type="module" src="add-movie.js"></script>



</body>

</html>
